# ML-WAF reverse-proxy demo.
#
# Architecture:
#   client -> nginx -> auth_request /waf_check -> ml-waf (FastAPI)
#                    -> (if allowed) proxy_pass -> demo-app (Flask)
#
# /waf_check returns 200 (allow) or 403 (block) — see app/main.py.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Buffer request bodies in memory so they can be replayed to both
    # the WAF check and the backend.
    client_body_buffer_size 128k;
    client_max_body_size 10m;

    server {
        listen 80;
        server_name _;

        # ── Ask ML-WAF if the request is safe ──────────────────────────
        location = /waf_check {
            internal;
            proxy_pass http://ml-waf:8000/waf_check;
            proxy_pass_request_body on;
            proxy_set_header Content-Length $content_length;
            proxy_set_header Content-Type $content_type;
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Original-Method $request_method;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Protected application ───────────────────────────────────────
        location / {
            auth_request /waf_check;
            error_page 403 = /blocked;

            proxy_pass http://demo-app:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /blocked {
            internal;
            default_type application/json;
            return 403 '{"error": "Request blocked by ML-WAF"}';
        }

        # ── ML-WAF dashboard, exposed directly for the demo ─────────────
        location /waf-dashboard/ {
            proxy_pass http://ml-waf:8000/;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
