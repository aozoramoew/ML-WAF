services:
  ml-waf:
    build: .
    container_name: ml-waf
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      # - RATE_LIMIT_REQUESTS=100
      # - RATE_LIMIT_WINDOW_SECONDS=60
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./models:/app/models

  # ── Demo "vulnerable shop" backend (intentionally unhardened) ──────────────
  demo-app:
    build: ./demo-app
    container_name: demo-app
    expose:
      - "5000"
    restart: unless-stopped

  # ── Reverse proxy: gates all traffic to demo-app through ML-WAF ────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: ml-waf-nginx
    ports:
      - "8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ml-waf
      - demo-app
    restart: unless-stopped
